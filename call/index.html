<!-- ══════════ LOADING SCREEN ══════════ -->
<div id="pageLoader" style="position:fixed;inset:0;z-index:99999;background:#f5f0e8;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.6s ease,visibility 0.6s ease;">
  <img src="/img/icon-loading.webp" alt="Milovi Cake" style="width:min(60vw,280px);height:min(60vw,280px);object-fit:contain;animation:loaderPulse 1.8s ease-in-out infinite;" width="80" height="80" />
  <p style="margin-top:24px;color:#c9934a;font-family:'Jost',sans-serif;font-size:12px;letter-spacing:0.25em;text-transform:uppercase;opacity:1;">MILOVI CAKE</p>
</div>
<style>
@keyframes loaderPulse{0%,100%{opacity:0.8;transform:scale(0.97)}50%{opacity:1;transform:scale(1.03)}}
#pageLoader.hidden{opacity:0;visibility:hidden;pointer-events:none}
</style>
<script>
function _hideLoader(){
  var l=document.getElementById('pageLoader');
  if(l){
    l.classList.add('hidden');
    l.style.pointerEvents='none';
    setTimeout(function(){if(l.parentNode)l.parentNode.removeChild(l);},700);
  }
}
window.addEventListener('load',function(){ setTimeout(_hideLoader, 400); });
setTimeout(_hideLoader, 5000);
</script>
