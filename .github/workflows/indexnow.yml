name: IndexNow Submit

on:
  push:
    branches: [ main ]
    paths:
      - '**/*.html'
      - 'sitemap.xml'
      - 'robots.txt'
      - 'img/**'
      - 'css/**'
      - 'js/**'
      - 'scripts/submit_indexnow.py'
      - 'f5c91a4d89e84b2ca6d4f3e7a1029b6c.txt'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  submit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Submit sitemap URLs to IndexNow
        run: python3 scripts/submit_indexnow.py --wait 45
