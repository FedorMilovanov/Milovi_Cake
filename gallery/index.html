<style>
:root {

*, *::before, *::after { box-sizing: border-box; }

html, body {

}

.gx-back {

}
.gx-back:hover { color: var(--gold); }
.gx-back::before {

  width: 24px; height: 1px;

}
.gx-back:hover::before { width: 36px; }

.gx-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 400;
  font-size: clamp(36px, 5.5vw, 62px);
  margin: 0 0 6px;
  letter-spacing: .02em;
  line-height: 1.1;
}
.gx-title em {

  color: var(--gold);
}

.gx-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin: 18px auto 16px;
  max-width: 320px;
}
.gx-divider span {
  flex: 1; height: 1px;
  background: linear-gradient(to right, transparent, var(--gold-light), transparent);
}
.gx-divider i {
  width: 5px; height: 5px;
  border: 1px solid var(--gold);
  transform: rotate(45deg);
  display: block;
}

.gx-sub {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.75;
  max-width: 560px;
  margin: 0 auto 28px;
  font-weight: 300;
  letter-spacing: .02em;
}

/* ===== ФИЛЬТР ===== */
.gx-filter {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 6px;
  margin-top: 0;
}

.gx-filter button {
  background: transparent;
  border: 1px solid rgba(61,43,31,.15);
  color: var(--brown-mid);
  padding: 7px 18px;
  border-radius: 999px;
  font: 400 11px/1 'Jost', sans-serif;
  letter-spacing: .08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all .25s;
}
.gx-filter button:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(184,130,58,.06);
}
.gx-filter button[aria-pressed="true"] {
  background: var(--brown);
  color: var(--white);
  border-color: var(--brown);
  letter-spacing: .1em;
}

.gx-rule {
  height: 1px;
  background: linear-gradient(to right, transparent 0%, var(--cream-deep) 20%, var(--gold-light) 50%, var(--cream-deep) 80%, transparent 100%);
  margin: 0;
}

/* ===== MUURI GRID ===== */
.gx-grid {
  position: relative; /* REQUIRED by Muuri */
  max-width: 1600px;
  margin: 0 auto;
  padding: var(--gap);
}

/* Item sizes - Muuri requires absolute positioning */
.gx-cell {
  position: absolute; /* REQUIRED by Muuri */
  display: block;
  margin: var(--gap);
  background: #1c1410;
  cursor: zoom-in;
  overflow: hidden;
  line-height: 0;
  z-index: 1;
}

/* Size variants */
.gx-cell.s-1x1 { width: calc(25% - var(--gap) * 2); height: var(--item-base); }
.gx-cell.s-2x1 { width: calc(50% - var(--gap) * 2); height: var(--item-base); }
.gx-cell.s-1x2 { width: calc(25% - var(--gap) * 2); height: calc(var(--item-base) * 2 + var(--gap) * 2); }
.gx-cell.s-2x2 { width: calc(50% - var(--gap) * 2); height: calc(var(--item-base) * 2 + var(--gap) * 2); }

@media (max-width: 1100px) {
  :root { --grid-cols: 3; --item-base: 260px; }
  .gx-cell.s-1x1 { width: calc(33.333% - var(--gap) * 2); }
  .gx-cell.s-2x1 { width: calc(66.666% - var(--gap) * 2); }
  .gx-cell.s-1x2 { width: calc(33.333% - var(--gap) * 2); }
  .gx-cell.s-2x2 { width: calc(66.666% - var(--gap) * 2); }
}

@media (max-width: 680px) {
  :root { --grid-cols: 2; --item-base: 200px; }
  .gx-cell.s-1x1 { width: calc(50% - var(--gap) * 2); }
  .gx-cell.s-2x1 { width: calc(100% - var(--gap) * 2); }
  .gx-cell.s-1x2 { width: calc(50% - var(--gap) * 2); }
  .gx-cell.s-2x2 { width: calc(100% - var(--gap) * 2); }
}

/* Item content wrapper - REQUIRED by Muuri */
.gx-cell-content {
  position: relative;
  width: 100%;
  height: 100%;
}

.gx-cell img,
.gx-cell .gx-vid-inline {
  display: block;
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center;
  transition: transform .9s cubic-bezier(.2,.8,.2,1), filter .5s;
  will-change: transform;
}

@media (hover: hover) {
  .gx-cell:hover img,
  .gx-cell:hover .gx-vid-inline { transform: scale(1.06); filter: brightness(1.04); }
}

.gx-cell::after {
  content: '';
  position: absolute;
  inset: auto 0 0 0;
  height: 55%;
  background: linear-gradient(to top,
    rgba(10,5,2,.72) 0%,
    rgba(10,5,2,.3) 40%,
    transparent 100%);
  opacity: 0;
  transition: opacity .4s;
  pointer-events: none;
}
.gx-cell:hover::after { opacity: 1; }

.gx-caption {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  padding: 20px 18px 16px;
  color: #fff;
  font: 300 12px/1.4 'Jost', sans-serif;
  letter-spacing: .07em;
  text-transform: uppercase;
  transform: translateY(6px);
  opacity: 0;
  transition: transform .4s cubic-bezier(.2,.8,.2,1), opacity .4s;
  pointer-events: none;
  text-shadow: 0 1px 6px rgba(0,0,0,.5);
  z-index: 2;
}
.gx-cell:hover .gx-caption { opacity: 1; transform: translateY(0); }

.gx-cell[data-type="video"] .gx-vid-badge {
  position: absolute;
  top: 12px; right: 12px;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,.14);
  border: 1px solid rgba(255,255,255,.3);
  backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
  transition: opacity .3s;
  z-index: 3;
}
.gx-cell:hover .gx-vid-badge { opacity: 0; }
.gx-vid-badge svg { width: 10px; height: 10px; fill: #fff; margin-left: 2px; }

.gx-vid-inline.is-loading { opacity: 0; }
.gx-vid-inline.is-ready   { opacity: 1; transition: opacity .6s; }

/* Muuri states */
.gx-cell.muuri-item-dragging { z-index: 3; }
.gx-cell.muuri-item-releasing { z-index: 2; }
.gx-cell.muuri-item-hidden { z-index: 0; pointer-events: none; }

/* ===== LIGHTBOX ===== */
.gx-light {
  position: fixed;
  inset: 0;
  background: rgba(6,3,1,.97);
  z-index: 9999;
  display: none;
  align-items: center;
  justify-content: center;

}
.gx-light[aria-hidden="false"] { display: flex; }
@keyframes gxFade { from { opacity: 0; } to { opacity: 1; } }

.gx-light-stage {

  display: flex;

.gx-light img,

}
.gx-light iframe {
  width: min(96vw, 540px);

}

.gx-ctrl {
  position: absolute;
  width: 44px; height: 44px;
  border-radius: 50%;
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.2);

    <svg viewBox="0 0 24 24"><path d="M18.3 5.71L12 12l6.3 6.29-1.41 1.42L10.59 13.4 4.3 19.71 2.88 18.3 9.17 12 2.88 5.71 4.3 4.29l6.29 6.3 6.3-6.3z"/></svg>
  </button>
  <button class="gx-ctrl gx-prev" id="gxPrev" aria-label="Назад">
    <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
  </button>
  <button class="gx-ctrl gx-next" id="gxNext" aria-label="Вперёд">
    <svg viewBox="0 0 24 24"><path d="M8.59 16.59L10 18l6-6-6-6-1.41 1.41L13.17 12z"/></svg>
  </button>
  <button class="gx-ctrl gx-mute" id="gxMute" aria-label="Звук" hidden>
    <svg id="gxMuteOff" viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zM19 12c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 5.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.17v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
    <svg id="gxMuteOn"  viewBox="0 0 24 24" hidden><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
  </button>
  <div class="gx-meta" id="gxMeta"></div>
</div>

<!-- Muuri from CDN (или npm install muuri) -->
<script src="https://cdn.jsdelivr.net/npm/muuri@0.9.5/dist/muuri.min.js"></script>

<script>
(function () {
  'use strict';

  const gridElement = document.getElementById('gxGrid');
  const allItems    = Array.from(gridElement.querySelectorAll('.gx-cell'));
  let grid;
  let visibleItems  = [];
  let currentIndex  = 0;

  /* ─────────────────────────────────────────────────────────────
     MUURI INITIALIZATION
     fillGaps: true — ключевая опция для идеального заполнения!
  ───────────────────────────────────────────────────────────── */
  
  function initMuuri() {
    grid = new Muuri(gridElement, {
      items: '.gx-cell',
      
      // LAYOUT: fillGaps заполняет все пустоты идеально
      layout: {
        fillGaps: true,           // Заполнять все пустоты!
        horizontal: false,        // Вертикальное направление
        alignRight: false,
        alignBottom: false,
        rounding: true            // Стабилизация расчётов
      },
      
      // Плавные анимации
      layoutDuration: 400,
      layoutEasing: 'ease-out',
      
      // Анимация показа/скрытия
      showDuration: 300,
      showEasing: 'ease-out',
      hideDuration: 300,
      hideEasing: 'ease-in',
      
      // Анимация видимости
      visibleStyles: {
        opacity: '1',
        transform: 'scale(1)'
      },
      hiddenStyles: {
        opacity: '0',
        transform: 'scale(0.8)'
      },
      
      // Без drag-and-drop (только галерея)
      dragEnabled: false
    });

    // Сохраняем видимые элементы для lightbox
    updateVisibleItems();
    
    // Слушаем конец layout для обновления списка
    grid.on('layoutEnd', updateVisibleItems);
  }

  function updateVisibleItems() {
    visibleItems = grid.getItems().filter(item => item.isActive());
  }

  /* ─────────────────────────────────────────────────────────────
     ФИЛЬТРАЦИЯ
  ───────────────────────────────────────────────────────────── */
  
  document.querySelectorAll('.gx-filter button').forEach(btn => {
    btn.addEventListener('click', () => {
      // Обновляем UI кнопок
      document.querySelectorAll('.gx-filter button')
              .forEach(b => b.setAttribute('aria-pressed', 'false'));
      btn.setAttribute('aria-pressed', 'true');
      
      const filter = btn.dataset.f;
      
      // Фильтруем через Muuri
      grid.filter(item => {
        const el = item.getElement();
        if (filter === 'all') return true;
        if (filter === 'photo') return el.dataset.type === 'photo';
        if (filter === 'video') return el.dataset.type === 'video';
        return (el.dataset.tags || '').split(/\s+/).includes(filter);
      });
    });
  });

  /* ─────────────────────────────────────────────────────────────
     RESIZE HANDLING
  ───────────────────────────────────────────────────────────── */
  
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      if (grid) grid.refreshItems().layout();
    }, 100);
  });

  /* ─────────────────────────────────────────────────────────────
     INLINE VIDEO AUTOPLAY
  ───────────────────────────────────────────────────────────── */
  
  const inlineVids = Array.from(gridElement.querySelectorAll('.gx-vid-inline'));
  
  inlineVids.forEach(v => {
    v.classList.add('is-loading');
    const ready = () => v.classList.replace('is-loading', 'is-ready');
    if (v.readyState >= 2) ready();
    else v.addEventListener('loadeddata', ready, { once: true });
  });

  const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  
  if ('IntersectionObserver' in window && !prefersReduced) {
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting && e.intersectionRatio >= 0.35) {
          e.target.play().catch(() => {});
        } else {
          e.target.pause();
        }
      });
    }, { threshold: [0, 0.35, 0.75] });
    
    inlineVids.forEach(v => io.observe(v));
  } else {
    inlineVids.forEach(v => { 
      v.pause(); 
      try { v.currentTime = 0.05; } catch (e) {} 
    });
  }

  /* ─────────────────────────────────────────────────────────────
     LIGHTBOX
  ───────────────────────────────────────────────────────────── */
  
  const light   = document.getElementById('gxLight');
  const stage   = document.getElementById('gxStage');
  const meta    = document.getElementById('gxMeta');
  const muteBtn = document.getElementById('gxMute');
  const muteOff = document.getElementById('gxMuteOff');
  const muteOn  = document.getElementById('gxMuteOn');

  function openLightbox(index) {
    currentIndex = index;
    const muuriItem = visibleItems[currentIndex];
    if (!muuriItem) return;
    
    const el = muuriItem.getElement();
    stage.innerHTML = '';
    meta.innerHTML = `<b>${el.dataset.title || ''}</b>${el.dataset.desc || ''}`;
    muteBtn.hidden = true;

    if (el.dataset.type === 'photo') {
      const img = document.createElement('img');
      img.src = el.dataset.full || el.querySelector('img').src;
      img.alt = el.querySelector('img')?.alt || '';
      stage.appendChild(img);
    } else if (el.dataset.mp4) {
      const v = document.createElement('video');
      v.src = el.dataset.mp4;
      v.controls = false; 
      v.autoplay = true;
      v.loop = true; 
      v.playsInline = true; 
      v.muted = true;
      stage.appendChild(v);
      muteBtn.hidden = false;
      updateMuteIcon(true);
      muteBtn.onclick = () => { v.muted = !v.muted; updateMuteIcon(v.muted); };
    }

    light.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  }

  function updateMuteIcon(muted) { 
    muteOff.hidden = !muted; 
    muteOn.hidden = muted; 
  }

  function closeLightbox() {
    light.setAttribute('aria-hidden', 'true');
    stage.innerHTML = '';
    document.body.style.overflow = '';
  }

  function navigate(direction) { 
    const newIndex = (currentIndex + direction + visibleItems.length) % visibleItems.length;
    openLightbox(newIndex); 
  }

  // Click на ячейках
  allItems.forEach(cell => {
    cell.addEventListener('click', () => {
      // Находим индекс в текущем списке видимых
      const muuriItem = grid.getItem(cell);
      const index = visibleItems.indexOf(muuriItem);
      if (index !== -1) openLightbox(index);
    });
  });

  // Controls
  document.getElementById('gxClose').onclick = closeLightbox;
  document.getElementById('gxPrev').onclick  = () => navigate(-1);
  document.getElementById('gxNext').onclick  = () => navigate(1);
  light.addEventListener('click', e => { if (e.target === light) closeLightbox(); });

  // Keyboard
  document.addEventListener('keydown', e => {
    if (light.getAttribute('aria-hidden') === 'true') return;
    if (e.key === 'Escape')     closeLightbox();
    if (e.key === 'ArrowLeft')  navigate(-1);
    if (e.key === 'ArrowRight') navigate(1);
    if (e.key.toLowerCase() === 'm' && !muteBtn.hidden) muteBtn.click();
  });

  // Touch swipe
  let touchStartY = null;
  light.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; });
  light.addEventListener('touchmove',  e => {
    if (touchStartY == null) return;
    if (e.touches[0].clientY - touchStartY > 80) { closeLightbox(); touchStartY = null; }
  });

  /* ─────────────────────────────────────────────────────────────
     INIT ON DOM READY
  ───────────────────────────────────────────────────────────── */
  
  // Ждём загрузки картинок для корректного расчёта размеров
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initMuuri);
  } else {
    initMuuri();
  }

  // Пересчёт после полной загрузки (на случай lazy-loaded изображений)
  window.addEventListener('load', () => {
    if (grid) {
      setTimeout(() => {
        grid.refreshItems().layout();
      }, 100);
    }
  });

})();
</script>
</body>
</html>
