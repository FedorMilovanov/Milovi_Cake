<style>
  :root {
    --cream: #f5f0e8;
    --cream-deep: #ede7db;
    --gold: #b8823a;
    --gold-light: #d4a85c;
    --brown: #3d2b1f;
    --brown-mid: #6b4c38;
    --text: #2c1a10;
    --muted: #9a7a62;
    --white: #FDFBF7;
    --gap: 2px;
    --row-h: 280px;
    --grid-cols: 4;
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    background: var(--cream);
    color: var(--text);
    font-family: 'Jost', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  a { color: inherit; }

  /* ===== ШАПКА ===== */
  .gx-header {
    padding: 56px 24px 40px;
    text-align: center;
    max-width: 900px;
    margin: 0 auto;
  }

  .gx-back {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    margin-bottom: 20px;
    transition: color .2s;
  }
  .gx-back:hover { color: var(--gold); }
  .gx-back::before {
    content: '';
    display: inline-block;
    width: 24px; height: 1px;
    background: currentColor;
    transition: width .3s;
  }
  .gx-back:hover::before { width: 36px; }

  .gx-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: clamp(36px, 5.5vw, 62px);
    margin: 0 0 6px;
    letter-spacing: .02em;
    line-height: 1.1;
  }
  .gx-title em {
    font-style: italic;
    color: var(--gold);
  }

  .gx-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin: 18px auto 16px;
    max-width: 320px;
  }
  .gx-divider span {
    flex: 1; height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-light), transparent);
  }
  .gx-divider i {
    width: 5px; height: 5px;
    border: 1px solid var(--gold);
    transform: rotate(45deg);
    display: block;
  }

  .gx-sub {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.75;
    max-width: 560px;
    margin: 0 auto 28px;
    font-weight: 300;
    letter-spacing: .02em;
  }

  /* ===== ФИЛЬТР ===== */
  .gx-filter {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    margin-top: 0;
  }

  .gx-filter button {
    background: transparent;
    border: 1px solid rgba(61,43,31,.15);
    color: var(--brown-mid);
    padding: 7px 18px;
    border-radius: 999px;
    font: 400 11px/1 'Jost', sans-serif;
    letter-spacing: .08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .25s;
  }
  .gx-filter button:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(184,130,58,.06);
  }
  .gx-filter button[aria-pressed="true"] {
    background: var(--brown);
    color: var(--white);
    border-color: var(--brown);
    letter-spacing: .1em;
  }

  .gx-rule {
    height: 1px;
    background: linear-gradient(to right, transparent 0%, var(--cream-deep) 20%, var(--gold-light) 50%, var(--cream-deep) 80%, transparent 100%);
    margin: 0;
  }

  /* ===== CSS GRID ===== */
  .gx-grid {
    display: grid;
    grid-template-columns: repeat(var(--grid-cols), 1fr);
    grid-auto-rows: var(--row-h);
    gap: var(--gap);
    padding: 0;
    max-width: 1600px;
    margin: 0 auto;
  }

  @media (max-width: 1100px) {
    :root { --grid-cols: 3; --row-h: 260px; }
  }
  @media (max-width: 680px) {
    :root { --grid-cols: 2; --row-h: 220px; }
  }

  /* Размеры ячеек */
  .gx-cell          { grid-column: span 1; grid-row: span 1; }
  .gx-cell.s-tall   { grid-column: span 1; grid-row: span 2; }
  .gx-cell.s-wide   { grid-column: span 2; grid-row: span 1; }
  .gx-cell.s-big    { grid-column: span 2; grid-row: span 2; }

  @media (max-width: 1100px) {
    .gx-cell.s-wide { grid-column: span 2; }
    .gx-cell.s-big  { grid-column: span 2; }
  }
  @media (max-width: 680px) {
    .gx-cell.s-wide { grid-column: span 2; }
    .gx-cell.s-big  { grid-column: span 2; }
  }

  .gx-cell {
    position: relative;
    display: block;
    width: 100%; height: 100%;
    margin: 0;
    background: #1c1410;
    cursor: zoom-in;
    overflow: hidden;
    line-height: 0;
  }

  .gx-cell img,
  .gx-cell .gx-vid-inline {
    display: block;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center;
    transition: transform .9s cubic-bezier(.2,.8,.2,1), filter .5s;
    will-change: transform;
  }

  @media (hover: hover) {
    .gx-cell:hover img,
    .gx-cell:hover .gx-vid-inline { transform: scale(1.06); filter: brightness(1.04); }
  }

  .gx-cell::after {
    content: '';
    position: absolute;
    inset: auto 0 0 0;
    height: 55%;
    background: linear-gradient(to top,
      rgba(10,5,2,.72) 0%,
      rgba(10,5,2,.3) 40%,
      transparent 100%);
    opacity: 0;
    transition: opacity .4s;
    pointer-events: none;
  }
  .gx-cell:hover::after { opacity: 1; }

  .gx-caption {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 20px 18px 16px;
    color: #fff;
    font: 300 12px/1.4 'Jost', sans-serif;
    letter-spacing: .07em;
    text-transform: uppercase;
    transform: translateY(6px);
    opacity: 0;
    transition: transform .4s cubic-bezier(.2,.8,.2,1), opacity .4s;
    pointer-events: none;
    text-shadow: 0 1px 6px rgba(0,0,0,.5);
  }
  .gx-cell:hover .gx-caption { opacity: 1; transform: translateY(0); }

  .gx-cell[data-type="video"] .gx-vid-badge {
    position: absolute;
    top: 12px; right: 12px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,.14);
    border: 1px solid rgba(255,255,255,.3);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
    transition: opacity .3s;
  }
  .gx-cell:hover .gx-vid-badge { opacity: 0; }
  .gx-vid-badge svg { width: 10px; height: 10px; fill: #fff; margin-left: 2px; }

  .gx-vid-inline.is-loading { opacity: 0; }
  .gx-vid-inline.is-ready   { opacity: 1; transition: opacity .6s; }

  /* ===== ЗАГЛУШКА-ЗАПОЛНИТЕЛЬ (rectangle completion) ===== */
  /*
    Фоновый паттерн задаёт ощущение «пустого холста» —
    не белый прямоугольник, а намеренная пауза между работами.
  */
  .gx-filler {
    background-color: var(--cream-deep);
    background-image:
      linear-gradient(45deg, rgba(184,130,58,.06) 25%, transparent 25%),
      linear-gradient(-45deg, rgba(184,130,58,.06) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, rgba(184,130,58,.06) 75%),
      linear-gradient(-45deg, transparent 75%, rgba(184,130,58,.06) 75%);
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0;
    pointer-events: none;
    /* Плавно появляется вместе с сеткой */
    animation: gxFillerIn .4s ease-out both;
  }
  @keyframes gxFillerIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ===== LIGHTBOX ===== */
  .gx-light {
    position: fixed;
    inset: 0;
    background: rgba(6,3,1,.97);
    z-index: 9999;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    animation: gxFade .3s ease-out;
  }
  .gx-light[aria-hidden="false"] { display: flex; }
  @keyframes gxFade { from { opacity: 0; } to { opacity: 1; } }

  .gx-light-stage {
    position: relative;
    max-width: min(96vw, 1600px);
    max-height: 92vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .gx-light img,
  .gx-light video,
  .gx-light iframe {
    max-width: 96vw;
    max-height: 92vh;
    display: block;
    background: #000;
    box-shadow: 0 40px 100px rgba(0,0,0,.7);
  }
  .gx-light iframe {
    width: min(96vw, 540px);
    aspect-ratio: 9 / 16;
    border: 0;
  }

  .gx-ctrl {
    position: absolute;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.2);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all .2s;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .gx-ctrl:hover {
    background: var(--gold);
    border-color: var(--gold);
    transform: scale(1.08);
  }
  .gx-ctrl svg { width: 18px; height: 18px; fill: #fff; }
  .gx-close { top: 24px; right: 24px; }
  .gx-prev  { left: 24px;  top: 50%; transform: translateY(-50%); }
  .gx-next  { right: 24px; top: 50%; transform: translateY(-50%); }
  .gx-mute  { bottom: 24px; right: 24px; }
  .gx-prev:hover { transform: translateY(-50%) scale(1.08); }
  .gx-next:hover { transform: translateY(-50%) scale(1.08); }

  .gx-meta {
    position: absolute;
    left: 24px; bottom: 24px;
    color: rgba(255,255,255,.75);
    font: 300 12px/1.5 'Jost', sans-serif;
    letter-spacing: .06em;
    text-transform: uppercase;
    max-width: 60vw;
  }
  .gx-meta b {
    font-weight: 400;
    font-size: 14px;
    display: block;
    margin-bottom: 4px;
    color: #fff;
    letter-spacing: .08em;
  }

  .gx-footer {
    text-align: center;
    padding: 40px 24px 56px;
    color: var(--muted);
    font: 300 12px/1 'Jost', sans-serif;
    letter-spacing: .1em;
    text-transform: uppercase;
  }
  .gx-footer a {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    color: var(--brown);
    text-decoration: none;
    padding: 14px 32px;
    border: 1px solid rgba(61,43,31,.2);
    border-radius: 999px;
    transition: all .25s;
    font-size: 11px;
  }
  .gx-footer a:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(184,130,58,.06);
  }

  @media (max-width: 700px) {
    .gx-close  { top: 14px; right: 14px; width: 38px; height: 38px; }
    .gx-prev   { left: 8px; }
    .gx-next   { right: 8px; }
    .gx-mute   { bottom: 14px; right: 14px; width: 38px; height: 38px; }
    .gx-meta   { left: 14px; bottom: 14px; font-size: 11px; max-width: 80vw; }
  }
</style>
</head>

    <svg id="gxMuteOn"  viewBox="0 0 24 24" hidden><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
  </button>
  <div class="gx-meta" id="gxMeta"></div>
</div>

<script>
(function () {
  'use strict';

  const grid  = document.getElementById('gxGrid');
  const cells = Array.from(grid.querySelectorAll('.gx-cell'));
  let list    = cells.slice();
  let idx     = 0;

  /* ─────────────────────────────────────────────────────────────
     RECTANGLE COMPLETION
     После каждого показа/скрытия карточек читаем фактические
     позиции ячеек через getComputedStyle (после layout),
     находим все незаполненные клетки сетки и вставляем
     div.gx-filler точно в нужные grid-позиции.
  ───────────────────────────────────────────────────────────── */

  function syncFillers() {
    /* Удаляем старые заглушки */
    grid.querySelectorAll('.gx-filler').forEach(f => f.remove());

    const visible = cells.filter(c => c.style.display !== 'none');
    if (!visible.length) return;

    /*
      Читаем resolved grid-позиции.
      Браузер заполняет их автоматически при layout;
      getComputedStyle возвращает целые числа.
    */
    let maxRowEnd = 0;
    let maxColEnd = 0;

    const positions = visible.map(c => {
      const cs = getComputedStyle(c);
      const rs = parseInt(cs.gridRowStart,    10);
      const re = parseInt(cs.gridRowEnd,      10);
      const cs2 = parseInt(cs.gridColumnStart, 10);
      const ce  = parseInt(cs.gridColumnEnd,   10);
      if (re  > maxRowEnd) maxRowEnd = re;
      if (ce  > maxColEnd) maxColEnd = ce;
      return { rs, re, cs: cs2, ce };
    });

    const cols = maxColEnd - 1; /* кол-во колонок сетки */

    /* Строим множество занятых клеток: «row,col» */
    const occupied = new Set();
    positions.forEach(({ rs, re, cs, ce }) => {
      for (let r = rs; r < re; r++) {
        for (let col = cs; col < ce; col++) {
          occupied.add(`${r},${col}`);
        }
      }
    });

    /* Находим пустые клетки во всех строках */
    const gaps = [];
    for (let r = 1; r < maxRowEnd; r++) {
      for (let col = 1; col <= cols; col++) {
        if (!occupied.has(`${r},${col}`)) gaps.push({ r, col });
      }
    }

    /*
      Слипаем соседние пустые клетки в одной строке в один
      широкий filler — меньше DOM-узлов, чище результат.
    */
    const runs = [];
    let run = null;
    gaps.forEach(({ r, col }) => {
      if (run && run.r === r && run.colEnd === col) {
        run.colEnd = col + 1;
      } else {
        if (run) runs.push(run);
        run = { r, colStart: col, colEnd: col + 1 };
      }
    });
    if (run) runs.push(run);

    runs.forEach(({ r, colStart, colEnd }) => {
      const filler = document.createElement('div');
      filler.className = 'gx-filler';
      /* Ставим ровно на место пустоты */
      filler.style.gridRow    = `${r}`;
      filler.style.gridColumn = `${colStart} / ${colEnd}`;
      grid.appendChild(filler);
    });
  }

  /*
    Запускаем синхронизацию ПОСЛЕ layout браузера.
    Двойной rAF гарантирует, что CSS Grid уже рассчитал позиции.
  */
  function scheduleFill() {
    requestAnimationFrame(() => requestAnimationFrame(syncFillers));
  }

  /* ── Inline-видео: autoplay при входе в viewport ── */
  const inlineVids = Array.from(grid.querySelectorAll('.gx-vid-inline'));
  inlineVids.forEach(v => {
    v.classList.add('is-loading');
    const ready = () => v.classList.replace('is-loading', 'is-ready');
    if (v.readyState >= 2) ready();
    else v.addEventListener('loadeddata', ready, { once: true });
  });

  const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if ('IntersectionObserver' in window && !prefersReduced) {
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting && e.intersectionRatio >= 0.35) e.target.play().catch(() => {});
        else e.target.pause();
      });
    }, { threshold: [0, 0.35, 0.75] });
    inlineVids.forEach(v => io.observe(v));
  } else {
    inlineVids.forEach(v => { v.pause(); try { v.currentTime = 0.05; } catch (e) {} });
  }

  /* ── Фильтр ── */
  document.querySelectorAll('.gx-filter button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.gx-filter button')
              .forEach(b => b.setAttribute('aria-pressed', 'false'));
      btn.setAttribute('aria-pressed', 'true');
      const f = btn.dataset.f;

      cells.forEach(c => {
        const show = f === 'all'
          || (f === 'photo' && c.dataset.type === 'photo')
          || (f === 'video' && c.dataset.type === 'video')
          || (c.dataset.tags || '').split(/\s+/).includes(f);
        c.style.display = show ? '' : 'none';
      });

      list = cells.filter(c => c.style.display !== 'none');
      scheduleFill();
    });
  });

  /* Адаптация при изменении размера окна (breakpoints меняют число колонок) */
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(scheduleFill, 150);
  });

  /* Первый запуск */
  scheduleFill();

  /* ── Lightbox ── */
  const light   = document.getElementById('gxLight');
  const stage   = document.getElementById('gxStage');
  const meta    = document.getElementById('gxMeta');
  const muteBtn = document.getElementById('gxMute');
  const muteOff = document.getElementById('gxMuteOff');
  const muteOn  = document.getElementById('gxMuteOn');

  function open(i) {
    idx = i;
    const c = list[idx];
    if (!c) return;
    stage.innerHTML = '';
    meta.innerHTML = `<b>${c.dataset.title || ''}</b>${c.dataset.desc || ''}`;
    muteBtn.hidden = true;

    if (c.dataset.type === 'photo') {
      const img = document.createElement('img');
      img.src = c.dataset.full || c.querySelector('img').src;
      img.alt = c.querySelector('img').alt;
      stage.appendChild(img);
    } else if (c.dataset.mp4) {
      const v = document.createElement('video');
      v.src = c.dataset.mp4;
      v.controls = false; v.autoplay = true;
      v.loop = true; v.playsInline = true; v.muted = true;
      stage.appendChild(v);
      muteBtn.hidden = false;
      updateMute(true);
      muteBtn.onclick = () => { v.muted = !v.muted; updateMute(v.muted); };
    }

    light.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  }

  function updateMute(muted) { muteOff.hidden = !muted; muteOn.hidden = muted; }

  function closeLB() {
    light.setAttribute('aria-hidden', 'true');
    stage.innerHTML = '';
    document.body.style.overflow = '';
  }

  function nav(d) { open((idx + d + list.length) % list.length); }

  cells.forEach(c => c.addEventListener('click', () => {
    list = cells.filter(x => x.style.display !== 'none');
    open(list.indexOf(c));
  }));

  document.getElementById('gxClose').onclick = closeLB;
  document.getElementById('gxPrev').onclick  = () => nav(-1);
  document.getElementById('gxNext').onclick  = () => nav(1);
  light.addEventListener('click', e => { if (e.target === light) closeLB(); });

  document.addEventListener('keydown', e => {
    if (light.getAttribute('aria-hidden') === 'true') return;
    if (e.key === 'Escape')     closeLB();
    if (e.key === 'ArrowLeft')  nav(-1);
    if (e.key === 'ArrowRight') nav(1);
    if (e.key.toLowerCase() === 'm' && !muteBtn.hidden) muteBtn.click();
  });

  /* Свайп вниз — закрыть (мобилки) */
  let startY = null;
  light.addEventListener('touchstart', e => { startY = e.touches[0].clientY; });
  light.addEventListener('touchmove',  e => {
    if (startY == null) return;
    if (e.touches[0].clientY - startY > 80) { closeLB(); startY = null; }
  });
})();
</script>
</body>
</html>
