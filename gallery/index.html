<style>
  :root {
    --cream: #f5f0e8;
    --cream-deep: #ede7db;
    --gold: #b8823a;
    --gold-light: #d4a85c;
    --brown: #3d2b1f;
    --text: #2c1a10;
    --muted: #9a7a62;
    --white: #FDFBF7;
    --gap: 4px;
    --row-h: 280px;
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    background: var(--cream);
    color: var(--text);
    font-family: 'Jost', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .gx-header {
    position: relative;
    padding: 56px 24px 40px;
    text-align: center;
    max-width: 900px;
    margin: 0 auto;
    z-index: 1;
  }

  .gx-back {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 11px; letter-spacing: .12em;
    text-transform: uppercase; color: var(--muted);
    text-decoration: none; margin-bottom: 20px;
    transition: color .2s;
  }
  .gx-back:hover { color: var(--gold); }

  .gx-title {
    font-family: 'Cormorant Garamond', serif; font-weight: 400;
    font-size: clamp(36px, 5.5vw, 62px);
    margin: 0 0 6px; line-height: 1.1;
  }
  .gx-title em { font-style: italic; color: var(--gold); }

  .gx-divider {
    display: flex; align-items: center; justify-content: center;
    gap: 16px; margin: 18px auto 16px; max-width: 320px;
  }
  .gx-divider span {
    flex: 1; height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-light), transparent);
  }
  .gx-divider i {
    width: 5px; height: 5px;
    border: 1px solid var(--gold);
    transform: rotate(45deg); display: block;
  }

  .gx-sub {
    color: var(--muted); font-size: 14px; line-height: 1.75;
    max-width: 560px; margin: 0 auto 28px;
    font-weight: 300;
  }

  .gx-filter {
    display: flex; flex-wrap: wrap;
    justify-content: center; gap: 6px;
  }
  .gx-filter button {
    background: transparent;
    border: 1px solid rgba(61,43,31,.15);
    color: var(--brown);
    padding: 7px 18px; border-radius: 999px;
    font: 400 11px/1 'Jost', sans-serif;
    letter-spacing: .08em; text-transform: uppercase;
    cursor: pointer; transition: all .25s;
  }
  .gx-filter button:hover {
    border-color: var(--gold); color: var(--gold);
  }
  .gx-filter button[aria-pressed="true"] {
    background: var(--brown); color: var(--white);
    border-color: var(--brown);
  }

  /* ===== MUURI GRID — ИСПРАВЛЕНО ===== */
  .gx-grid {
    position: relative;
    width: 100%;
    max-width: 1600px;
    margin: 0 auto;
    padding: var(--gap);
    /* Muuri сам управляет позиционированием */
  }

  /* Базовый размер ячейки — Muuri переопределит */
  .gx-cell {
    display: block;
    position: absolute; /* Muuri требует absolute */
    margin: var(--gap);
    background: #1c1410;
    cursor: pointer;
    overflow: hidden;
    border-radius: 4px;
    opacity: 0;
    transform: translateY(30px) scale(.96);
    animation: gxReveal .7s cubic-bezier(.2,.8,.2,1) forwards;
  }
  @keyframes gxReveal {
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Базовые размеры (Muuri может переопределить через width/height в JS) */
  .gx-cell { width: calc(25% - var(--gap) * 2); height: var(--row-h); }
  .gx-cell.s-tall { height: calc(var(--row-h) * 2 + var(--gap) * 2); }
  .gx-cell.s-wide { width: calc(50% - var(--gap) * 2); }
  .gx-cell.s-big { width: calc(50% - var(--gap) * 2); height: calc(var(--row-h) * 2 + var(--gap) * 2); }

  @media (max-width: 1100px) {
    :root { --row-h: 260px; }
    .gx-cell { width: calc(33.333% - var(--gap) * 2); }
    .gx-cell.s-wide, .gx-cell.s-big { width: calc(66.666% - var(--gap) * 2); }
  }
  @media (max-width: 680px) {
    :root { --row-h: 220px; --gap: 3px; }
    .gx-cell { width: calc(50% - var(--gap) * 2); }
    .gx-cell.s-wide, .gx-cell.s-big { width: calc(100% - var(--gap) * 2); }
  }

  .gx-cell-content {
    width: 100%; height: 100%;
    position: relative;
  }

  .gx-cell img,
  .gx-cell video {
    display: block;
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform .9s cubic-bezier(.2,.8,.2,1);
  }
  @media (hover: hover) {
    .gx-cell:hover img,
    .gx-cell:hover video { transform: scale(1.07); }
  }

  .gx-cell::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(
      circle at var(--mx, 50%) var(--my, 50%),
      rgba(184,130,58,.18) 0%, transparent 60%
    );
    opacity: 0; transition: opacity .4s;
    pointer-events: none; z-index: 2;
  }
  .gx-cell:hover::before { opacity: 1; }

  .gx-caption {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 20px 18px 16px;
    color: #fff;
    font: 300 12px/1.4 'Jost', sans-serif;
    letter-spacing: .07em; text-transform: uppercase;
    transform: translateY(8px); opacity: 0;
    transition: transform .4s, opacity .4s;
    pointer-events: none; z-index: 3;
  }
  .gx-cell:hover .gx-caption { opacity: 1; transform: translateY(0); }

  .gx-cell .gx-vid-badge {
    position: absolute; top: 12px; right: 12px;
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(0,0,0,.5);
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; z-index: 3;
  }
  .gx-vid-badge svg { width: 10px; height: 10px; fill: #fff; margin-left: 2px; }

  /* ===== LIGHTBOX (оставляю как есть) ===== */
  .gx-light {
    position: fixed; inset: 0;
    z-index: 9999;
    opacity: 0; visibility: hidden;
    transition: opacity .4s, visibility .4s;
  }
  .gx-light[aria-hidden="false"] {
    opacity: 1; visibility: visible;
  }

  .gx-backdrop {
    position: absolute; inset: 0;
    background: #0a0502;
  }

  .gx-backdrop-img {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center;
    filter: blur(60px) brightness(.45);
    transform: scale(1.15);
    transition: background-image .6s;
  }

  .gx-swiper {
    position: relative;
    width: 100%; height: 100vh;
    z-index: 2;
  }

  .swiper-slide {
    display: flex; align-items: center; justify-content: center;
    padding: 40px 0;
  }

  .gx-slide-frame {
    position: relative;
    max-width: 80vw;
    max-height: 78vh;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 50px 100px rgba(0,0,0,.6);
    background: #000;
  }
  .gx-slide-frame img,
  .gx-slide-frame video {
    display: block;
    max-width: 80vw;
    max-height: 78vh;
    object-fit: contain;
  }

  .gx-ctrl {
    position: absolute;
    width: 48px; height: 48px;
    border-radius: 50%;
    background: rgba(255,255,255,.1);
    border: 1px solid rgba(255,255,255,.2);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all .3s;
    z-index: 10;
  }
  .gx-ctrl:hover { background: var(--gold); }
  .gx-ctrl svg { width: 18px; height: 18px; fill: #fff; }

  .gx-close { top: 24px; right: 24px; }
  .gx-share { top: 24px; right: 84px; }
  .gx-fs    { top: 24px; right: 144px; }

  .gx-nav-btn {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    width: 56px; height: 56px;
  }
  .gx-prev { left: 28px; }
  .gx-next { right: 28px; }

  .gx-meta {
    position: absolute;
    bottom: 32px; left: 50%;
    transform: translateX(-50%);
    text-align: center;
    color: #fff;
    z-index: 10;
    max-width: 640px;
    pointer-events: none;
  }
  .gx-counter {
    display: inline-block;
    padding: 6px 18px;
    border-radius: 999px;
    background: rgba(255,255,255,.08);
    font: 500 10px 'Jost', sans-serif;
    letter-spacing: .18em;
    margin-bottom: 14px;
  }
  .gx-title-v2 {
    font: 400 clamp(20px, 3vw, 28px) 'Cormorant Garamond', serif;
    margin: 0 0 6px;
  }
  .gx-desc-v2 {
    font: 300 12px 'Jost', sans-serif;
    color: rgba(255,255,255,.65);
  }

  .gx-thumbs {
    position: absolute;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 6px;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(15,8,5,.7);
    overflow-x: auto;
    max-width: 88vw;
    z-index: 10;
    scrollbar-width: none;
  }
  .gx-thumbs::-webkit-scrollbar { display: none; }
  .gx-thumb {
    width: 44px; height: 44px;
    border-radius: 6px; overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    flex-shrink: 0;
  }
  .gx-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .gx-thumb.active { border-color: var(--gold); }

  .gx-footer {
    text-align: center;
    padding: 60px 24px 80px;
    color: var(--muted);
    font: 300 12px/1 'Jost', sans-serif;
    letter-spacing: .1em;
  }
  .gx-footer a {
    display: inline-flex; align-items: center; gap: 10px;
    color: var(--brown); text-decoration: none;
    padding: 16px 36px;
    border: 1px solid rgba(61,43,31,.2);
    border-radius: 999px;
    transition: all .3s;
  }
  .gx-footer a:hover {
    border-color: var(--gold); color: var(--gold);
  }

  @media (max-width: 768px) {
    .gx-close { top: 16px; right: 16px; width: 40px; height: 40px; }
    .gx-share { top: 16px; right: 64px; width: 40px; height: 40px; }
    .gx-fs    { display: none; }
    .gx-prev  { left: 8px; width: 44px; height: 44px; }
    .gx-next  { right: 8px; width: 44px; height: 44px; }
    .gx-slide-frame {
      max-width: 92vw;
      max-height: 60vh;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: .01ms !important;
      transition-duration: .01ms !important;
    }
  }
</style>
</head>

<script>
window.addEventListener('DOMContentLoaded', () => {
  'use strict';

  const $  = (s, c = document) => c.querySelector(s);
  const $$ = (s, c = document) => Array.from(c.querySelectorAll(s));
  const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const isTouch = window.matchMedia('(hover: none)').matches;

  const gridEl = $('#gxGrid');
  const cells  = $$('.gx-cell', gridEl);

  // Уникальные ID для deep-link
  cells.forEach((c, i) => c.dataset.id = `work-${i + 1}`);
  
  // Stagger animation
  cells.forEach((c, i) => {
    c.style.animationDelay = `${Math.min(i * 0.035, 1.2)}s`;
  });

  // ===== ИНИЦИАЛИЗАЦИЯ MUURI С ПРИНУДИТЕЛЬНЫМ LAYOUT =====
  const grid = new Muuri(gridEl, {
    items: '.gx-cell',
    layout: {
      fillGaps: true,
      horizontal: false,
      alignRight: false,
      alignBottom: false,
      rounding: true,
    },
    dragEnabled: false,
    layoutDuration: 400,
    layoutEasing: 'cubic-bezier(.2,.8,.2,1)',
  });

  // ⭐ ФОРСИРОВАННЫЙ ПЕРЕСЧЁТ ПОСЛЕ ЗАГРУЗКИ ВСЕХ ИЗОБРАЖЕНИЙ
  const allImages = $$('img', gridEl);
  let loadedCount = 0;
  
  allImages.forEach(img => {
    if (img.complete) {
      loadedCount++;
    } else {
      img.addEventListener('load', () => {
        loadedCount++;
        if (loadedCount === allImages.length) {
          grid.refreshItems();
          grid.layout();
        }
      }, { once: true });
    }
  });

  // Дополнительный пересчёт через 500ms (страховка)
  setTimeout(() => {
    grid.refreshItems();
    grid.layout();
  }, 500);

  // Пересчёт при изменении размера окна
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      grid.refreshItems();
      grid.layout();
    }, 250);
  });

  // ===== TILT 3D (десктоп) =====
  if (!prefersReduced && !isTouch && window.VanillaTilt) {
    VanillaTilt.init(cells, {
      max: 6,
      speed: 500,
      glare: true,
      'max-glare': 0.18,
      scale: 1.02,
      perspective: 1200,
    });
  }

  // ===== ПОДСВЕТКА ОТ КУРСОРА =====
  if (!isTouch) {
    cells.forEach(c => {
      c.addEventListener('mousemove', (e) => {
        const r = c.getBoundingClientRect();
        c.style.setProperty('--mx', `${((e.clientX - r.left) / r.width) * 100}%`);
        c.style.setProperty('--my', `${((e.clientY - r.top) / r.height) * 100}%`);
      });
    });
  }

  // ===== ФИЛЬТР =====
  $$('.gx-filter button').forEach(btn => {
    btn.addEventListener('click', () => {
      $$('.gx-filter button').forEach(b => b.setAttribute('aria-pressed', 'false'));
      btn.setAttribute('aria-pressed', 'true');
      const f = btn.dataset.f;

      grid.filter(item => {
        const el = item.getElement();
        if (f === 'all') return true;
        if (f === 'photo') return el.dataset.type === 'photo';
        if (f === 'video') return el.dataset.type === 'video';
        return (el.dataset.tags || '').split(/\s+/).includes(f);
      });
    });
  });

  // ===== LIGHTBOX =====
  const light       = $('#gxLight');
  const swiperWrap  = $('#gxSwiperWrapper');
  const thumbsEl    = $('#gxThumbs');
  const backdropImg = $('#gxBackdropImg');
  const elCurrent   = $('#gxCurrent');
  const elTotal     = $('#gxTotal');
  const elTitle     = $('#gxTitleV2');
  const elDesc      = $('#gxDescV2');

  let swiper = null;
  let currentItems = [];

  function getVisibleItems() {
    return grid.getItems()
      .filter(i => i.isVisible())
      .map(i => i.getElement());
  }

  function buildSlides() {
    swiperWrap.innerHTML = '';
    thumbsEl.innerHTML = '';

    currentItems.forEach((el, idx) => {
      const slide = document.createElement('div');
      slide.className = 'swiper-slide';
      const frame = document.createElement('div');
      frame.className = 'gx-slide-frame';

      if (el.dataset.type === 'photo') {
        const img = document.createElement('img');
        img.src = el.dataset.full || el.querySelector('img')?.src || '';
        img.alt = el.dataset.title || '';
        img.loading = idx === 0 ? 'eager' : 'lazy';
        frame.appendChild(img);
      } else {
        const video = document.createElement('video');
        video.src = el.dataset.mp4 || '';
        video.loop = true;
        video.playsInline = true;
        video.muted = true;
        video.preload = 'metadata';
        video.poster = el.dataset.poster || '';
        frame.appendChild(video);
      }

      slide.appendChild(frame);
      swiperWrap.appendChild(slide);

      // Thumbnail
      const thumb = document.createElement('div');
      thumb.className = 'gx-thumb';
      const tImg = document.createElement('img');
      tImg.src = el.querySelector('img')?.src || el.dataset.poster || '';
      tImg.alt = '';
      tImg.loading = 'lazy';
      thumb.appendChild(tImg);
      thumb.addEventListener('click', () => swiper?.slideTo(idx));
      thumbsEl.appendChild(thumb);
    });
  }

  function updateMeta(idx) {
    const el = currentItems[idx];
    if (!el) return;
    elCurrent.textContent = idx + 1;
    elTotal.textContent = currentItems.length;
    elTitle.textContent = el.dataset.title || '';
    elDesc.textContent = el.dataset.desc || '';
    
    $$('.gx-thumb').forEach((t, i) => t.classList.toggle('active', i === idx));
    
    const activeThumb = thumbsEl.children[idx];
    if (activeThumb) {
      activeThumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }

    // Backdrop
    const poster = el.dataset.poster || el.querySelector('img')?.src || '';
    if (poster) {
      backdropImg.style.backgroundImage = `url("${poster}")`;
    }

    history.replaceState(null, '', `#${el.dataset.id}`);
  }

  function initSwiper(startIndex = 0) {
    if (swiper) { swiper.destroy(true, true); swiper = null; }
    swiper = new Swiper('#gxSwiper', {
      effect: 'coverflow',
      grabCursor: true,
      centeredSlides: true,
      slidesPerView: 'auto',
      initialSlide: startIndex,
      speed: 500,
      keyboard: { enabled: true },
      coverflowEffect: {
        rotate: 25,
        depth: 280,
        modifier: 1,
        slideShadows: false,
      },
      navigation: {
        nextEl: '#gxNext',
        prevEl: '#gxPrev',
      },
      on: {
        init() { updateMeta(this.activeIndex); },
        slideChange() { updateMeta(this.activeIndex); },
      },
    });
  }

  function openLightbox(startIndex) {
    currentItems = getVisibleItems();
    if (!currentItems.length) return;
    buildSlides();
    light.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
    initSwiper(startIndex);
  }

  function closeLightbox() {
    light.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
    history.replaceState(null, '', window.location.pathname);
    if (swiper) { swiper.destroy(true, true); swiper = null; }
  }

  // Привязка кликов
  cells.forEach(c => {
    c.addEventListener('click', () => {
      currentItems = getVisibleItems();
      const idx = currentItems.indexOf(c);
      if (idx >= 0) openLightbox(idx);
    });
  });

  $('#gxClose').addEventListener('click', closeLightbox);
  $('.gx-backdrop').addEventListener('click', closeLightbox);

  document.addEventListener('keydown', e => {
    if (light.getAttribute('aria-hidden') === 'true') return;
    if (e.key === 'Escape') closeLightbox();
  });

  // Deep-link
  function handleHash() {
    const hash = window.location.hash.replace('#', '');
    if (!hash) return;
    const target = cells.find(c => c.dataset.id === hash);
    if (target) setTimeout(() => target.click(), 600);
  }
  window.addEventListener('load', handleHash);

  // Инициализация параллакса
  window.addEventListener('scroll', () => {
    document.documentElement.style.setProperty('--scroll', `${window.pageYOffset * 0.35}px`);
  }, { passive: true });

  console.log('✅ Milovi Cake Gallery — Muuri initialized with', cells.length, 'items');
});
</script>

</body>
</html>
