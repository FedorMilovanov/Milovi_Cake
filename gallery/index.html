:root {

  --gold: #b8823a;
  --gold-light: #d4a85c;
  --brown: #3d2b1f;
  --gap: 8px;
}

*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  background: var(--cream);
  color: #2c1a10;
  font-family: 'Jost', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* Header */
.gx-header {
  padding: 64px 24px 56px;
  text-align: center;
  max-width: 920px;
  margin: 0 auto;
}
.gx-back {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
  color: #9a7a62; text-decoration: none; margin-bottom: 28px;
}
.gx-back:hover { color: var(--gold); }

.gx-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(46px, 6.4vw, 72px);
  font-weight: 400; margin: 0 0 12px; line-height: 1.03;
}
.gx-title em { font-style: italic; color: var(--gold); }

.gx-divider {
  display: flex; align-items: center; justify-content: center;
  gap: 20px; margin: 24px auto; max-width: 240px;
}
.gx-divider span { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--gold-light), transparent); }
.gx-divider i { width: 5px; height: 5px; border: 1px solid var(--gold); transform: rotate(45deg); }

.gx-sub {
  color: #9a7a62; font-size: 15px; max-width: 560px; margin: 0 auto 36px;
}

/* Premium Filters */
.gx-filter {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
}
.gx-filter button {
  background: transparent;
  border: 1px solid rgba(61,43,31,.12);
  color: var(--brown);
  padding: 10px 26px;
  border-radius: 999px;
  font: 400 11.5px/1 'Jost', sans-serif;
  letter-spacing: .09em; text-transform: uppercase;
  cursor: pointer;
  transition: all .25s cubic-bezier(.23,1,.32,1);
}
.gx-filter button[aria-pressed="true"] {
  background: var(--brown);
  color: #fff;
  border-color: var(--brown);
}

/* ===== PROFESSIONAL SEAMLESS GRID ===== */
.gx-grid {
  position: relative;
  max-width: 1760px;
  margin: 0 auto;
  padding: var(--gap);
}

.gx-cell {
  position: absolute;
  margin: var(--gap);
  background: #1c1410;
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(0,0,0,.1);
  transition: transform .45s cubic-bezier(.23,1,.32,1), 
              box-shadow .45s cubic-bezier(.23,1,.32,1);
  opacity: 0;
  transform: translateY(28px) scale(.985);
  animation: gxReveal .75s cubic-bezier(.23,1,.32,1) forwards;
  will-change: transform, box-shadow;
}

/* Premium hover lift — stylish and elegant */
.gx-cell:hover {
  transform: translateY(-9px) scale(1.018);
  box-shadow: 0 22px 55px rgba(0,0,0,.18);
  z-index: 2;
}

@keyframes gxReveal {
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* Balanced masonry sizes — no lonely items */
.gx-cell { width: calc(25% - var(--gap)*2); aspect-ratio: 1.16; }
.gx-cell.s-tall { aspect-ratio: 1.0; }
.gx-cell.s-wide { width: calc(50% - var(--gap)*2); aspect-ratio: 1.92; }
.gx-cell.s-big  { width: calc(50% - var(--gap)*2); aspect-ratio: 1.0; }

@media (max-width: 1200px) {
  .gx-cell { width: calc(33.333% - var(--gap)*2); }
  .gx-cell.s-wide, .gx-cell.s-big { width: calc(66.666% - var(--gap)*2); }
}
@media (max-width: 680px) {
  .gx-cell { width: calc(50% - var(--gap)*2); }
  .gx-cell.s-wide, .gx-cell.s-big { width: calc(100% - var(--gap)*2); }
}

.gx-cell-content { position: relative; width: 100%; height: 100%; }

.gx-cell img, .gx-cell video {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 1.2s cubic-bezier(.23,1,.32,1);
}
.gx-cell:hover img, .gx-cell:hover video {
  transform: scale(1.075);
}

<script>
window.addEventListener('DOMContentLoaded', () => {
  const $ = (s, c = document) => c.querySelector(s);
  const $$ = (s, c = document) => Array.from(c.querySelectorAll(s));
  const gridEl = $('#gxGrid');
  const cells = $$('.gx-cell', gridEl);

  cells.forEach((c, i) => c.dataset.id = `work-${i + 1}`);

  // Professional Muuri with perfect layout
  const grid = new Muuri(gridEl, {
    items: '.gx-cell',
    layout: { fillGaps: true, horizontal: false, alignRight: false, rounding: true },
    dragEnabled: false,
    layoutDuration: 450,
    layoutEasing: 'cubic-bezier(.23,1,.32,1)',
  });

  // Force perfect seamless layout
  const imgs = $$('img', gridEl);
  let loaded = 0;
  imgs.forEach(img => {
    if (img.complete) loaded++;
    else img.onload = () => { if (++loaded === imgs.length) { grid.refreshItems(); grid.layout(); } }
  });
  setTimeout(() => { grid.refreshItems(); grid.layout(); }, 750);

  window.addEventListener('resize', () => {
    clearTimeout(window._rt);
    window._rt = setTimeout(() => { grid.refreshItems(); grid.layout(); }, 240);
  });

  // Filters
  $$('.gx-filter button').forEach(btn => {
    btn.onclick = () => {
      $$('.gx-filter button').forEach(b => b.setAttribute('aria-pressed', 'false'));
      btn.setAttribute('aria-pressed', 'true');
      const f = btn.dataset.f;
      grid.filter(item => {
        const el = item.getElement();
        if (f === 'all') return true;
        if (f === 'photo' || f === 'video') return el.dataset.type === f;
        return (el.dataset.tags || '').includes(f);
      });
    };
  });

  // Premium Lightbox
  const light = $('#gxLight');
  const swiperWrap = $('#gxSwiperWrapper');
  const thumbsEl = $('#gxThumbs');
  const elCurrent = $('#gxCurrent');
  const elTotal = $('#gxTotal');
  const elTitle = $('#gxTitleV2');
  const elDesc = $('#gxDescV2');

  let swiper = null, currentItems = [];

  function getVisible() {
    return grid.getItems().filter(i => i.isVisible()).map(i => i.getElement());
  }

  function buildSlides() {
    swiperWrap.innerHTML = ''; thumbsEl.innerHTML = '';
    currentItems.forEach((el, idx) => {
      const slide = document.createElement('div');
      slide.className = 'swiper-slide';
      const frame = document.createElement('div');
      frame.className = 'gx-slide-frame';

      if (el.dataset.type === 'photo') {
        const img = document.createElement('img');
        img.src = el.dataset.full || el.querySelector('img')?.src;
        frame.appendChild(img);
      } else {
        const vid = document.createElement('video');
        vid.src = el.dataset.mp4 || '';
        vid.loop = true; vid.muted = true; vid.playsInline = true;
        vid.poster = el.dataset.poster || '';
        frame.appendChild(vid);
      }
      slide.appendChild(frame);
      swiperWrap.appendChild(slide);

      const thumb = document.createElement('div');
      thumb.className = 'gx-thumb';
      const tImg = document.createElement('img');
      tImg.src = el.querySelector('img')?.src || el.dataset.poster || '';
      thumb.appendChild(tImg);
      thumb.onclick = () => swiper?.slideTo(idx);
      thumbsEl.appendChild(thumb);
    });
  }

  function updateMeta(idx) {
    const el = currentItems[idx];
    elCurrent.textContent = idx + 1;
    elTotal.textContent = currentItems.length;
    elTitle.textContent = el.dataset.title || '';
    elDesc.textContent = el.dataset.desc || '';
    $$('.gx-thumb').forEach((t, i) => t.classList.toggle('active', i === idx));
  }

  function initSwiper(start = 0) {
    if (swiper) swiper.destroy(true, true);
    swiper = new Swiper('#gxSwiper', {
      effect: 'fade',
      speed: 480,
      initialSlide: start,
      navigation: { nextEl: '#gxNext', prevEl: '#gxPrev' },
      on: { init() { updateMeta(this.activeIndex); }, slideChange() { updateMeta(this.activeIndex); } }
    });
  }

  function openLB(startIdx) {
    currentItems = getVisible();
    if (!currentItems.length) return;
    buildSlides();
    light.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
    initSwiper(startIdx);
  }

  function closeLB() {
    light.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
    if (swiper) { swiper.destroy(true, true); swiper = null; }
  }

  cells.forEach(c => c.onclick = () => {
    currentItems = getVisible();
    const idx = currentItems.indexOf(c);
    if (idx >= 0) openLB(idx);
  });

  $('#gxClose').onclick = closeLB;
  light.onclick = e => { if (e.target === light) closeLB(); };
  document.onkeydown = e => { if (light.getAttribute('aria-hidden') === 'false' && e.key === 'Escape') closeLB(); };

  $('#gxShare').onclick = () => {
    const el = currentItems[swiper?.activeIndex || 0];
    if (el) navigator.clipboard.writeText(location.origin + location.pathname + '#' + el.dataset.id);
  };

  console.log('%c[Premium v4] Milovi Gallery — Professional seamless grid + elegant lift hover + 10/10 UX', 'color:#b8823a');
});
</script>
</body>
