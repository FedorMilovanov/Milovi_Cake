<style>
  :root{
    --cream:#f5f0e8; --gold:#c9934a; --brown:#3d2b1f; --text:#2c1a10;
    --muted:#9a7a62; --white:#FDFBF7;
    --gap:2px;          /* «почти без стыков» */
    --radius:0px;       /* острые края = студийность; поставь 6px если хочешь мягче */
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--cream);color:var(--text);font-family:'Jost',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit}

  /* ===== Шапка страницы ===== */
  .gx-header{padding:48px 24px 24px;text-align:center;max-width:980px;margin:0 auto}
  .gx-back{display:inline-flex;align-items:center;gap:6px;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);text-decoration:none;margin-bottom:16px}
  .gx-back:hover{color:var(--gold)}
  .gx-title{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(32px,5vw,56px);margin:0 0 12px;letter-spacing:.01em}
  .gx-sub{color:var(--muted);font-size:15px;line-height:1.6;max-width:640px;margin:0 auto}
  .gx-filter{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:24px}
  .gx-filter button{background:transparent;border:1px solid rgba(61,43,31,.18);color:var(--brown);padding:8px 16px;border-radius:999px;font:500 13px/1 'Jost',sans-serif;letter-spacing:.04em;cursor:pointer;transition:.2s}
  .gx-filter button:hover{border-color:var(--gold);color:var(--gold)}
  .gx-filter button[aria-pressed="true"]{background:var(--brown);color:var(--white);border-color:var(--brown)}

  /* ===== Сетка ===== */
  .gx-grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    grid-auto-rows: 22vw;
    gap:var(--gap);
    padding:24px;
    max-width:1600px;
    margin:0 auto;
  }
  @media (max-width: 1100px){ .gx-grid{grid-template-columns:repeat(3,1fr); grid-auto-rows: 28vw} }
  @media (max-width: 700px){  .gx-grid{grid-template-columns:repeat(2,1fr); grid-auto-rows: 44vw; padding:12px; gap:2px} }

  .gx-cell{position:relative;overflow:hidden;background:#1a1a1a;cursor:zoom-in;border-radius:var(--radius);content-visibility:auto;contain-intrinsic-size:300px}
  .gx-cell.s-tall { grid-row: span 2; }
  .gx-cell.s-wide { grid-column: span 2; }
  .gx-cell.s-big  { grid-row: span 2; grid-column: span 2; }
  @media (max-width:700px){
    .gx-cell.s-wide,.gx-cell.s-big{grid-column: span 2}
    .gx-cell.s-big{grid-row: span 2}
  }

  .gx-cell img,
  .gx-cell video{
    width:100%;height:100%;object-fit:cover;display:block;
    transition:transform .8s cubic-bezier(.2,.8,.2,1), filter .4s;
    will-change:transform;
  }
  .gx-cell:hover img,
  .gx-cell:hover video{ transform:scale(1.04); }

  /* мягкое затемнение снизу для подписи */
  .gx-cell::after{
    content:""; position:absolute; inset:auto 0 0 0; height:42%;
    background:linear-gradient(to top, rgba(0,0,0,.55), transparent);
    opacity:0; transition:opacity .35s; pointer-events:none;
  }
  .gx-cell:hover::after{opacity:1}

  .gx-caption{
    position:absolute; left:14px; right:14px; bottom:12px;
    color:#fff; font:400 13px/1.35 'Jost',sans-serif;
    transform:translateY(8px); opacity:0; transition:.35s;
    pointer-events:none; text-shadow:0 1px 4px rgba(0,0,0,.4);
  }
  .gx-cell:hover .gx-caption{opacity:1; transform:translateY(0)}

  
/* ===== Видео в сетке: автопроигрывание при загрузке (минимализм) ===== */
.gx-cell .gx-vid-inline{
  width:100%; height:100%; object-fit:cover; display:block;
  transition: transform .8s cubic-bezier(.2,.8,.2,1), filter .4s, opacity .4s;
  will-change: transform;
  background:#1a1a1a;
}
.gx-cell:hover .gx-vid-inline{ transform:scale(1.04); }
/* Плавное появление видео */
.gx-cell .gx-vid-inline.is-loading{ opacity:0; }
.gx-cell .gx-vid-inline.is-ready{ opacity:1; }

/* ===== Минималистичный SVG play в углу для видео ===== */
  .gx-cell[data-type="video"] .gx-play{
    position:absolute; top:12px; right:12px;
    width:28px; height:28px; border-radius:50%;
    background:rgba(255,255,255,.14); backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.35);
    display:flex; align-items:center; justify-content:center;
    transition:.25s; pointer-events:none;
  }
  .gx-cell[data-type="video"]:hover .gx-play{
    background:rgba(201,147,74,.9); border-color:rgba(255,255,255,.6); transform:scale(1.08);
  }
  .gx-play svg{width:11px;height:11px;fill:#fff;margin-left:1px}

  /* ===== Lightbox (fullscreen) ===== */
  .gx-light{
    position:fixed; inset:0; background:rgba(8,4,2,.96); z-index:9999;
    display:none; align-items:center; justify-content:center;
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    animation: gxFade .25s ease-out;
  }
  .gx-light[aria-hidden="false"]{display:flex}
  @keyframes gxFade{from{opacity:0}to{opacity:1}}

  .gx-light-stage{
    position:relative; max-width:min(96vw, 1600px); max-height:92vh;
    display:flex; align-items:center; justify-content:center;
  }
  .gx-light img,
  .gx-light video,
  .gx-light iframe{
    max-width:96vw; max-height:92vh; display:block;
    background:#000; box-shadow:0 30px 80px rgba(0,0,0,.6);
  }
  .gx-light iframe{width:min(96vw, 540px); aspect-ratio:9/16; border:0}

  .gx-ctrl{
    position:absolute; width:44px; height:44px; border-radius:50%;
    background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.25);
    color:#fff; display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:.2s; backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
  }
  .gx-ctrl:hover{background:var(--gold); border-color:var(--gold); transform:scale(1.06)}
  .gx-ctrl svg{width:18px;height:18px;fill:#fff}
  .gx-close{top:24px; right:24px}
  .gx-prev{left:24px; top:50%; transform:translateY(-50%)}
  .gx-next{right:24px; top:50%; transform:translateY(-50%)}
  .gx-mute{bottom:24px; right:24px}
  .gx-prev:hover,.gx-next:hover{transform:translateY(-50%) scale(1.06)}

  .gx-meta{
    position:absolute; left:24px; bottom:24px; color:#fff;
    font:400 13px/1.4 'Jost',sans-serif; max-width:60vw;
    text-shadow:0 1px 4px rgba(0,0,0,.5);
  }
  .gx-meta b{font-weight:500; font-size:15px; display:block; margin-bottom:4px}

  @media (max-width: 700px){
    .gx-close{top:14px;right:14px;width:38px;height:38px}
    .gx-prev{left:8px} .gx-next{right:8px}
    .gx-mute{bottom:14px;right:14px;width:38px;height:38px}
    .gx-meta{left:14px;bottom:14px;font-size:12px;max-width:80vw}
  }

  ::view-transition-old(card),::view-transition-new(card){
    animation-duration:.45s; animation-timing-function:cubic-bezier(.2,.8,.2,1);
  }
</style>

<script>
/* ===== Лёгкая логика галереи ===== */
(function(){
  const cells = Array.from(document.querySelectorAll('#gxGrid .gx-cell'));
  let idx = 0, list = cells;

  /* ---- Inline-видео: автопроигрывание при попадании в viewport (как Reels) ---- */
  /* Все видео добавлены сразу инлайном (data-type="video"), включаются IntersectionObserver. */
  const inlineVids = Array.from(document.querySelectorAll('#gxGrid .gx-vid-inline'));

  // Плавное появление после первого кадра
  inlineVids.forEach(v => {
    v.classList.add('is-loading');
    const ready = () => v.classList.replace('is-loading','is-ready');
    if (v.readyState >= 2) ready();
    else v.addEventListener('loadeddata', ready, { once: true });
  });

  // Уважение к prefers-reduced-motion
  const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  if ('IntersectionObserver' in window && !prefersReduced){
    const io = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const v = entry.target;
        if (entry.isIntersecting){
          // мобильный энергосбережение: проигрываем только когда >=40% видео видно
          if (entry.intersectionRatio >= 0.4){
            v.play().catch(()=>{});
          }
        } else {
          v.pause();
        }
      });
    }, { threshold: [0, 0.4, 0.75] });
    inlineVids.forEach(v => io.observe(v));
  } else {
    // Fallback или reduced-motion: показываем первый кадр (видео не двигается)
    inlineVids.forEach(v => { v.pause(); try { v.currentTime = 0.05; } catch(e){} });
  }

  // На hover — мгновенный буст к скорости (обычная)
  document.querySelectorAll('#gxGrid .gx-cell[data-type="video"]').forEach(cell => {
    const v = cell.querySelector('.gx-vid-inline');
    if (!v) return;
    cell.addEventListener('mouseenter', () => { v.play().catch(()=>{}); });
  });

  /* ---- Фильтр ---- */
  document.querySelectorAll('.gx-filter button').forEach(btn=>{
    btn.addEventListener('click', () => {
      document.querySelectorAll('.gx-filter button').forEach(b => b.setAttribute('aria-pressed','false'));
      btn.setAttribute('aria-pressed','true');
      const f = btn.dataset.f;
      cells.forEach(c => {
        const show = f==='all'
          || (f==='photo' && c.dataset.type==='photo')
          || (f==='video' && c.dataset.type==='video')
          || (c.dataset.tags||'').split(/\s+/).includes(f);
        c.style.display = show ? '' : 'none';
      });
      list = cells.filter(c => c.style.display !== 'none');
    });
  });

  /* ---- Lightbox ---- */
  const light = document.getElementById('gxLight');
  const stage = document.getElementById('gxStage');
  const meta  = document.getElementById('gxMeta');
  const muteBtn = document.getElementById('gxMute');
  const muteOff = document.getElementById('gxMuteOff');
  const muteOn  = document.getElementById('gxMuteOn');

  function open(i){
    idx = i;
    const c = list[idx]; if (!c) return;
    stage.innerHTML = '';
    meta.innerHTML = `<b>${c.dataset.title||''}</b>${c.dataset.desc||''}`;
    muteBtn.hidden = true;

    if (c.dataset.type === 'photo'){
      const img = document.createElement('img');
      img.src = c.dataset.full || c.querySelector('img').src;
      img.alt = c.querySelector('img').alt;
      stage.appendChild(img);
    } else {
      // Видео: если есть embed (VK/RuTube) — используем iframe, иначе локальный mp4
      if (c.dataset.embed && !/XXXX/.test(c.dataset.embed)){
        const f = document.createElement('iframe');
        f.src = c.dataset.embed;
        f.allow = 'autoplay; encrypted-media; fullscreen; picture-in-picture';
        f.allowFullscreen = true;
        stage.appendChild(f);
      } else if (c.dataset.mp4){
        const v = document.createElement('video');
        v.src = c.dataset.mp4; v.controls = false; v.autoplay = true;
        v.loop = true; v.playsInline = true; v.muted = true;
        stage.appendChild(v);
        muteBtn.hidden = false;
        updateMute(true);
        muteBtn.onclick = () => { v.muted = !v.muted; updateMute(v.muted); };
      }
    }

    light.setAttribute('aria-hidden','false');
    document.body.style.overflow = 'hidden';
  }
  function updateMute(muted){
    muteOff.hidden = !muted; muteOn.hidden = muted;
  }
  function close(){
    light.setAttribute('aria-hidden','true');
    stage.innerHTML = '';
    document.body.style.overflow = '';
  }
  function nav(d){
    const next = (idx + d + list.length) % list.length;
    open(next);
  }

  cells.forEach((c, i) => c.addEventListener('click', () => {
    list = cells.filter(x => x.style.display !== 'none');
    open(list.indexOf(c));
  }));
  document.getElementById('gxClose').onclick = close;
  document.getElementById('gxPrev').onclick = () => nav(-1);
  document.getElementById('gxNext').onclick = () => nav(1);
  light.addEventListener('click', e => { if (e.target === light) close(); });
  document.addEventListener('keydown', e => {
    if (light.getAttribute('aria-hidden') === 'true') return;
    if (e.key === 'Escape') close();
    if (e.key === 'ArrowLeft') nav(-1);
    if (e.key === 'ArrowRight') nav(1);
    if (e.key.toLowerCase() === 'm' && !muteBtn.hidden) muteBtn.click();
  });

  /* Свайп вниз для закрытия (мобилка) */
  let startY = null;
  light.addEventListener('touchstart', e => startY = e.touches[0].clientY);
  light.addEventListener('touchmove', e => {
    if (startY == null) return;
    if (e.touches[0].clientY - startY > 80){ close(); startY = null; }
  });
})();
</script>
